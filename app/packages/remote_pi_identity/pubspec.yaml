name: remote_pi_identity
description: >-
  Owner-key Ed25519 identity synced across devices of the same human via
  platform-native key sync (iCloud Keychain on iOS, Block Store on Android).
version: 0.2.0
publish_to: none

environment:
  sdk: ">=3.11.0 <4.0.0"
  flutter: ">=3.41.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: dev.remotepi.identity
        pluginClass: RemotePiIdentityPlugin
      ios:
        pluginClass: RemotePiIdentityPlugin

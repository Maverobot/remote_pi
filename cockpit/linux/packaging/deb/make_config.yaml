# Pacote .deb do Cockpit. NÃO buildável neste Mac — gerado nos jobs `linux-x64`
# (ubuntu-24.04) e `linux-arm64` (ubuntu-24.04-arm) do CI. A arquitetura é
# detectada pelo Fastforge (uname -m) no runner.
#
# Artefato resultante: remote-pi-cockpit_<versão>_<arch>.deb
display_name: Remote Pi Cockpit
package_name: remote-pi-cockpit
# Installed-Size do pacote .deb, em KB (campo obrigatório do maker do Fastforge).
# Estimativa do bundle Flutter Linux release (~150 MB); recalibrar com
# `du -sk build/linux/*/release/bundle` quando houver build Linux real.
installed_size: 150000
maintainer:
  name: Jacob Moura
  email: jacobaraujo7@gmail.com
section: devel
priority: optional
# Deps de runtime: GTK3 + libs base do bundle Flutter Linux. (Confirmar/expandir
# via `ldd` do bundle no CI — premissa do plano.)
dependencies:
  - libgtk-3-0
  - libblkid1
  - liblzma5
generic_name: Remote Pi Cockpit
categories:
  - Development
  - IDE
keywords:
  - pi
  - remote-pi
  - agent
  - cockpit
startup_notify: true
startup_wm_class: work.jacobmoura.cockpit
icon: linux/runner/resources/app_icon_512.png
metainfo: linux/work.jacobmoura.cockpit.metainfo.xml
